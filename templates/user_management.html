{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white fw-bold">Add User</div>
            <div class="card-body">
                <form method="POST" action="/users/add">
                    <input name="username" class="form-control mb-2" placeholder="Username" required>
                    <input name="password" type="password" class="form-control mb-2" placeholder="Password" required>
                    <select name="role" class="form-select mb-3">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                    <button class="btn btn-success w-100 shadow-sm">Create</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white fw-bold">Users</div>
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th><th>User</th><th>Role</th><th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for u in users %}
                        <tr>
                            <td>{{ u.id }}</td>
                            <td class="fw-bold">{{ u.username }}</td>
                            <td><span class="badge bg-secondary">{{ u.role }}</span></td>
                            <td>
                                {% if u.username != 'admin' %}
                                <a href="/users/delete/{{ u.id }}" class="btn btn-sm btn-danger shadow-sm">Del</a>
                                {% endif %}
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
